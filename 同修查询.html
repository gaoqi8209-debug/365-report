觉之舞后，释放了情绪，人能平静下来，念了忏悔。"},{"d":"2026-05-26","t":"觉之舞\n \n大汗淋漓，跳完身体放松、轻盈\n \n气脉顺畅的体感\n觉之诵（因生气而修）\n \n家人一句话触发情绪，当下坐下来诵\n \n诵念中感受到小腹和胃在翻动\n \n愤怒的能量从头部降到腹部\n \n人变清明了\n今日核心收获： 生气时知道坐下来诵，能量自然沉降转化，不是想通的，是诵通的。"},{"d":"2026-05-29","t":"被外再的事件引发大脑不停的转停不下来，跳完舞之后、再唱诵，思绪慢慢平下来。然后再去面对问题时能有觉的去处理。"},{"d":"2026-05-30","t":"28号零晨12点多打卡，29号晚打卡显示已打完卡，翻看时才明白咋回事今天一起累计上。\n\n\n今天刚开始是有点身累不想䠷的念头，但小组里定有跳觉之舞时间段，还是进入一起跳。大概10分钟后疲惫感消失身体恢复了精神，越跳越轻松😉。\n\n觉之舞结束后，坐下练习觉之诵，感受到清爽、清明。"},{"d":"2026-05-31","t":"一阶的舞之前是不愿跳的，觉得太慢。现在越来越喜欢一阶的觉之舞，能把自己拉回到身体的每一个动作上。在舞结束的时候能稳稳的站住了。之前是站不稳的。\n\n诵时到最后打瞌睡，不知道是睡得太少还啥原因。"},{"d":"2026-06-01","t":"今天开始是身体累有点勉强自己跳，到后来是越来越轻松跳意犹未尽的感觉。\n诵也是越来越进入状态。"},{"d":"2026-06-02","t":"养成一个习惯刚开需要始坚持，现在是自然想跳了\n\n\n诵也是诵完后头脑更清晰，做事有效率了"},{"d":"2026-06-03","t":"继续舞，继续诵，\n跟着走就行。"},{"d":"2026-06-04","t":"每天能养养成习惯去跳起来身体出汗后身心轻松，做事有效率了。\n\n今天想事情多了头脑停不下来，身体也有累，诵完后像是充满了电一样，又恢复了精神。"},{"d":"2026-06-05","t":"身体累时跳舞，念头多烦恼时唱诵已成为我身心减压的习惯。"},{"d":"2026-06-06","t":"与大家一起共修真好，不敢偷懒"},{"d":"2026-06-08","t":"从坚持到自然喜爱上跳舞💃，身体通畅，心情好烦恼少了。唱诵完回归平静"},{"d":"2026-06-13","t":"感觉身体沉困本不想动，但看到365群里有共修不想错过，起来跟着诵完人就精神多了。跟着舞动不勉强慢慢动，感受身体与呼吸，结束时已完全充满电的感觉，继续复习功课头脑也很清明。"},{"d":"2026-06-16","t":"昨天因与家人的观点不同而发生了激烈的争吵，积压的愤怒被引爆了。炒过之后还是觉得不解气，被情绪紧紧抓住！修完忏悔又有自责自己学习的方法没有用到而懊恼。半天闷闷不乐。\n\n下午3点开始跳觉之舞一段过后40分钟还是觉得能量不够轻盈继续跳40分钟，觉之诵20分钟，莲师祈请文及持诵莲师心咒把自己从愤怒的能量里完全的拉出来。\n头脑清凉内心又回到宽广觉的状态同时还伴有淡淡的平安喜乐感。这个体验让我对法更增强了无比的信心。"},{"d":"2026-06-17","t":"舞动后身体通畅，呼吸变深，觉之诵时能从丹田发音，"},{"d":"2026-06-19","t":"舞蹈后+诵=觉更稳定"},{"d":"2026-06-21","t":"有要打卡的事挤时间也练习一下，不然就忽略算了。再者不练习也觉得对不起所有发心的sx们！"},{"d":"2026-06-27","t":"气下沉到丹田，心越来越稳定"}]},{"n":"高婷33沈阳","cn":"高婷33沈阳","e":14,"raw":17,"tw":186,"ts":259,"md":[{"d":"2026-05-31","t":"未打卡"},{"d":"2026-06-04","t":"未打卡"},{"d":"2026-06-06","t":"未打卡"},{"d":"2026-06-11","t":"未打卡"},{"d":"2026-06-12","t":"未打卡"},{"d":"2026-06-16","t":"未打卡"},{"d":"2026-06-17","t":"未打卡"},{"d":"2026-06-18","t":"未打卡"},{"d":"2026-06-19","t":"未打卡"},{"d":"2026-06-20","t":"未打卡"},{"d":"2026-06-21","t":"未打卡"},{"d":"2026-06-22","t":"未打卡"},{"d":"2026-06-23","t":"未打卡"},{"d 小芬）","cn":"小芬33佛山顺德(小芬)","e":2,"raw":2,"tw":1125,"ts":631,"md":[{"d":"2026-06-20","t":"未打卡"},{"d":"2026-06-22","t":"未打卡"}],"rv":false,"rd":0,"rc":0,"lj":false,"js":"三阶","bj":"3","notes":[{"d":"2026-05-23","t":"#2025.5.23#D1\n早上起床先打开觉之舞前行音乐，慢慢觉知身体，感受呼吸，连接身体的同时感恩身体一夜帮我修复疲劳。坚持了一段时间，音乐很慢，我的身体很喜欢。\n\n11:00左右觉之舞A段舞动起来，全身汗湿，放松结束后，再打开央金老师《心中珍宝》放松。\n\n今天一整天的身体都处于极度兴奋🥰状态，对外境充满了探索的心，去市场买菜回来后还是很兴奋。我想观一下这股能量？\n\n回到自己房间平时打坐的位置，点上香看着LS的像，开始唱诵，这股能量极度兴奋，自己如同一条大鲸鱼在海洋里可以跳到空中再旋转几下落进海洋，非常有力量在海洋去畅游；看到自己在大自然中可以极速在斜坡冲下去用力奔跑；看到自己可以顺着极速的瀑布在河流中飘荡；看到自己回到虚空中可以自由飞舞。这股能量慢慢消退了一下，LS的像出现在虚空，白色的光流经我的头轮，红色光流经我的喉轮；蓝色的光流经我的心轮。余下的兴奋能量慢慢回归到我的脐轮。\n\n安静下来了❤️🙏"},{"d":"2026-05-24","t":"早上早课之前觉之诵慢慢安住，内心很安定；觉之舞20分钟身体很放松。\n今天在外面有碎片时间随时随地放松跳觉之舞。"},{"d":"2026-05-28","t":"觉之诵是每天必做的，早上起床先觉之舞前行唤醒身体，碎片时间跳觉之舞❤️\n感恩有大家一起共创能量场，一起打通任督二脉"},{"d":"2026-05-29","t":"下午感觉胸口能量卡住，跳完第一段舞身体顺畅了❤️🙏"},{"d":"2026-06-05","t":"觉之诵每天保命必做功课，唱诵就是一个流动的过程，啥能量都流动走；觉之舞与身体连接的过程，过去没觉过度紧张使用身体，现在慢慢把身体紧张的筋膜松开。"},{"d":"2026-06-09","t":"#2026.6.9#早上起床用觉之舞前行在床上慢慢伸懒腰，拉伸身体，感谢五脏六腑和身体配合昨晚帮助我修复，慢慢带着觉知用“六字诀”去呼吸关注到每个脏腑，身体很放松；\n\n下午上班16:00多空隙时间跳了10分钟，身体能量活跃起来；\n\n晚上下班回来先做15分钟禅睡照顾到身体，谢谢身体工作了一天，给孩子做了晚餐。跳觉之舞B段，跳着跳着突然大哭起来，最近两个月清理的都是深层资料库，原来剩余的细微能量交织还有一部分卡在身体里，最后的回归音乐听完，再听一首《心中珍宝》，5月份BG的慈悲能量流动全身心。\n\n此刻身体满满的放松与感恩。谢谢教学组的良苦用心和所有的义工SX们❤️有你们真好呀👍☀️"}]},{"n":"杨静","cn":"杨静","e":0,"raw":0,"tw":1005,"ts":613,"md":[],"rv":false,"rd":0,"rc":0,"lj":false,"js":"三阶","bj":"4","notes":[{"d":"2026-05-24","t":"心靠在音乐上，心乐合一"},{"d":"2026-05-26","t":"在今天跳觉知舞的过程当中，我不由自主的呼唤我的五脏六腑，我的所有的细胞跟着我一起跳，是他们支持着我的学修。我恳求他们继续支持我的学修，在往生之际，带着他们一起去极乐世界。"},{"d":"2026-05-31","t":"身体欠安，完全没有体力"},{"d":"2026-06-03","t":"慢慢形成习惯了"},{"d":"2026-06-13","t":"坐着看了一会儿书，身体就想起身活动，打开觉之舞的音乐，身体就被音乐摄受自然的舞动…，闭上眼睛，心靠在音乐上，身心全部放松，沉浸在自性舞蹈中，没有一个我在主宰。\n\n跳完40分钟后，觉之诵，跟着老师的引导词，全然的放松，去体会那个空的感觉，越放松越没有妄念，对身心内外的觉知非常清明，有点像老师说的觉无处不在。\n\n结束时睁开眼睛，不聚焦任何一点，房间的摆设变得有点幻，因为有空间，才显出有摆设。空是母体。"}]},{"n":"马宁 33 陕西","cn":"马宁33陕西","e":2,"raw":2,"tw":1119,"ts":680,"md":[{"d":"2026-05-25","t":"未打卡"},{"d":"2026-06-18","t":"未打卡"}],"rv":false,"rd":0,"rc":0,"lj 体受限时，觉知正跳着最深情的舞\n这些天一直默默看着群里大家分享“觉之舞”的心得，满屏都是跳动的生命力，热气腾腾、生龙活虎，我的心也跟着欢喜。但这份欢喜底下，藏着只有自己知道的一丝波澜——\n五月底，我刚刚做完腰椎微创手术，到现在才一个月。\n医生说，腰部不能扭动。那些旋转、扭转、摆胯的动作，我只能暂时搁置。但别的地方——\n我的手臂还可以自由伸展，\n我的头还能轻轻摇摆，\n我的肩膀还能慢慢抖动，\n我的双腿还能轻轻弹跳。\n身体大部分依然能参与这场觉之舞的盛宴。\n起初，我也急了。看着师兄们热情飞扬，我那颗“想好好参与”的心，悄悄被刺了一下。腰部的限制，像一道无形的墙，让我觉得自己的舞蹈不完整了。\n但就在那丝波澜里，老师常说的一句话轻轻托起我：你能清楚感知到的，就是“觉”。\n对，此刻我有觉知，它清楚地知道——\n腰部有伤，动作受限；\n手臂在舒展延伸；\n头随着韵律轻轻摆动；\n还有心中那一丝“不完整”的念头，来过，又走了。\n那一刻，我突然明白：我不是不能好好跳“觉之舞”，而是在用更清醒、更柔软的方式跳觉知舞。\n当腰部被护腰轻轻守护，其他部位的感知变得格外细腻。\n我感受到指尖划过空气的轻盈，\n脖颈转动时的自在，\n肩膀抖动时那一丝丝微小的释放——\n这些过去被忽略的细节，如今变得鲜活。\n觉之舞，不是关于身体某处的完美动作，\n它是全身心的在场，是深深的当下。\n腰不能转，那就让手臂去表达；\n胯骨不能动，让肩膀去诉说；\n脊柱要求静止，让头部引领。\n身体哪儿在动，觉知就跟到哪儿；\n身体哪儿静，觉知也安住哪儿。\n于是，我给自己编了一支温柔的“觉之舞”：\n站着或坐着，手臂缓缓舒展如莲花绽放；\n头轻轻摇摆如风拂柳；\n肩膀上下抖动似细雨洒落；\n双腿轻弹如大地微微震动。\n腰部安静守护着康复，\n剩下的部分替它诉说心声。\n我发现，觉之舞无需追求一定要怎样，真正强大的是，在身体受限时依然可以深情表达。\n所以，我想对同样经历身体限制的伙伴们说：别急，也别觉得自己跳得不完整。腰不能扭，那就安静等待。我们的身体，有着千百种与觉知共舞的方式——手臂可以画圆，肩膀可以起伏，指尖可以诉说，甚至一次深呼吸，也可以是一支完整的觉之舞。\n等腰部康复，我一定会重新回到那些旋转与扭转中。希望到那时，这份在限制中生长出来的柔软，让每个动作都透着当下的觉察和珍惜。\n而现在，我用还可以动的身体，跳着独属于我的最诚挚的觉之舞——\n身体有限，觉知无限。\n无论身体如何，觉，从未受限。\n\n感恩两位老师，感恩这一切。🙏"}]},{"n":"戚晨34上海","cn":"戚晨34上海","e":2,"raw":5,"tw":415,"ts":545,"md":[{"d":"2026-05-30","t":"未打卡"},{"d":"2026-06-03","t":"未打卡"},{"d":"2026-06-05","t":"未打卡"},{"d":"2026-06-13","t":"未打卡"},{"d":"2026-06-15","t":"未打卡"}],"rv":true,"rd":3,"rc":1,"lj":false,"js":"三阶","bj":"4","notes":[]},{"n":"程夏倩34上海","cn":"程夏倩34上海","e":0,"raw":0,"tw":877,"ts":688,"md":[],"rv":false,"rd":0,"rc":0,"lj":false,"js":"三阶","bj":"4","notes":[]},{"n":"愛菊34唐山","cn":"愛菊34唐山","e":1,"raw":1,"tw":1002,"ts":626,"md":[{"d":"2026-06-23","t":"未打卡"}],"rv":false,"rd":0,"rc":0,"lj":false,"js":"三阶","bj":"4","notes":[]},{"n":"老醋男34昆明","cn":"老醋男34昆明","e":0,"raw":3,"tw":1453,"ts":641,"md":[{"d":"2026-06-05","t":"未达标 · 舞:0, 诵:20分钟"},{"d":"2026-06-06","t":"未达标 · 舞:40, 诵:0分钟"},{"d":"2026-06-10","t":"未打卡"}],"rv":true,"rd":3,"rc":1,"lj":false,"js":"三阶","bj":"4","notes":[{"d":"2026-05-23","t":"无常\n之前很不愿意跳2阶，这两天突然就想跳了。所以，顺其自然，不要太勉强自己"},{"d":"2026-05-24","t":"最后回 一样，肠胃松了些，这些细胞没有闹情绪了。觉察了下，和饮食有关，也和吃了中药调理有关。\n继续舞继续诵，让身体和谐，把散乱消耗的能量这种习惯赶走，继续找寻内心的宁静。希望通过练习这些方法。以帮助更多的人，"},{"d":"2026-05-30","t":"天天跳舞，这两天早上起床有点身体疼痛，但不累，继续调整。晚上了也要舞一会，爽。\n继续寻找能量平衡的我。"},{"d":"2026-06-01","t":"有一个用力跳舞的自己，一个要做任务的自己，有一个思考如何走出向外求的自己。"},{"d":"2026-06-02","t":"身体是很重要的承载体，所以我要照顾好她，心和身体没有完全分开，他们两个合在一起是这个完整的我，所以心需要修炼。继续舞、继续诵。放松、自在，不累积负能量，越来越通畅，找到回家的路。"},{"d":"2026-06-03","t":"下午回家一出打电话后，感觉交流的不舒服，升出一些负能量夹着肚子饿，把自己显得闷闷的。舞的时候一片能身体前面，跳着跳就通畅了些，淡了些。"},{"d":"2026-06-06","t":"今日傍晚舞，光脚踩在地上，还有一些热气。没有吃晚饭，但是因为是周末心比较静，没有像上班一样到点没吃饭的饿，舞起来的时候身体很是轻松、通畅、有力量的，不急不躁，跟随觉之舞b的节奏一起动起来，身体和心很享受音乐的节奏，融为一体，看着有点急躁的能量升起来，也有感觉到左侧腹部有一股不通畅的气，但一点也不影响跳起来舒服和愉快的感觉。好爽，一会就跳完了。中间睁开眼睛跳了一会，人也是松弛的。\n     今天跳舞觉察到可能工作在外有时候吃饭能量不太好，所以消化不好。今天在家完全没有这种感觉。\n\n诵的时候很舒服的感受升起来，像小时候把我放在在摇摇椅里面，我不哭不闹也不饿，天气风和日丽，小小的我很舒服，一个人呆着，好像老师说自己和自己在一起的感觉。能量好的状态招感好的能量。"},{"d":"2026-06-08","t":"舞走一天的烦恼和坏能量，睡个感觉\n。\n今天舞的时候感觉身体有力量"},{"d":"2026-06-11","t":"继续舞诵刚开始，觉察到自己用力，在使劲，提醒放松。\n每天都练习，身体没有那么紧。\n\n继续寻找松弛，放下期待，专注的舞、专注的诵。\n\n今天下午舞的时候，觉察到身体被一个壳盖住，但开始有松动，在身体的左边有些打开了。\n专注的舞，只有身体零部件在舞。"},{"d":"2026-06-15","t":"跳舞、诵就是为锻炼身体。\n然而收获了，身体的放松，肌肉的疼痛，身体的通畅，还有一个急着证明自己存在的我。一切如梦，如梦亦如幻。\n\n在舞里面，平时不想面对的人和事清楚显现，我就一一面对，不在逃避，不再害怕。看着这些事和人，看着自己在分析这些事由，里面有你、有我，有对、有错，还有道德、人品，清清楚楚，然后事件和情绪分开了，看着自己在分析、在判断，然后情绪消融。这个时候，那个狡猾的心、那个我来了。继续舞，内外的能量是柔和的，只有舞动的动作，能听到鸟儿在唱歌，楼下人说话的声音也能听的到几句。外面清楚明白，心也清楚明白，没有情绪，也没有事件，也没有我，只是一个有舞动动作集合体在动。真是梦一场。如梦如幻。"},{"d":"2026-06-17","t":"昨天躺着看回放，肩膀和后背，今天告诉我她很不舒服。"},{"d":"2026-06-19","t":"开始舞的时候，左侧肩膀和背部连接的区域，有点硬，这几天都是这个部位。\n跳的过程中，觉察到自己又开始跳着跳着开始用力起来，诵的时候也是。两次发现都提醒自己，并温柔的拉回来，告诉自己，轻松、不用太用力。\n诵的时候左侧颈部前面有一团模糊的能量，随着放松和诵，散掉了一些。\n     今天诵，想起朋友说我看问题怎么不想\n乐观和好的结果，他说的没错，理性加乐观，也是一种心理好的导向。诵的最后央金老师引导说:带着觉，看着自己的念头不分析，不判断，也不落入。经验背后宽广的觉。这个解释比想好和不想好的，更宽广。"},{"d":"2026-06-21","t":"保持当下，坚持锻炼身体，啥也不想。\n肩夹骨那块的僵硬部位，今天在弯腰下向下的时候已经比昨天好多了。看来看手机没啥好处。最近工作填满了每日时间，还想在保持身体向上增强的状态下，跟上上课节奏，所以忙的手机刷手机比较少了。这样挺好。"},{"d":"2026-06-22","t":"跳就是了，啥也别想。午饭后扭一扭帮助消化。\n天天舞，脚底都是痛的。但一点也没有负担。越来越不用力。越来越感觉一动起来身体就很开心。\n晚上去河边散步，想把晚上吃的东西消化消化，就又舞了舞。有点累。脚底板是痛的。小腿肚子有点涨涨的，硬硬的。很久没有这种强度的锻炼了。\n    回家发现老公没把厨房收拾完，特别来气。说了他几句懒和难听的话。觉之诵，看着火爆爆的情绪来来去去。是谁在烦恼呢？没有一个长存不变的我。感觉是身体的手腕、上半身有气，不舒服。\n诵完，气走了。"},{"d":"2026-06-23","t":"继续整理身心，看到不协调的原因。"},{"d":"2026-06-24","t":"心情不爽了舞一舞，吃撑了舞一舞，感觉身体不舒服了舞一舞，精神饱满的时候也舞一舞。太爽了。\n舞+诵=最佳排毒套餐"},{"d":"2026-06-25","t":"舞着舞着身体通了，不舒服就消散了。继续舞，继续诵"},{"d":"2026-06-27","t":"舞着舞着，昨天在医院做检查的画面从身体里浮现出来，画面的出现好像在清理身体，也是在回放、在离开。"}]},{"n":"刘智雄34湖南省（Yishanyishui）","cn":"刘智雄34湖南省(Yishanyishui)","e":1,"raw":4,"tw":801,"ts":488,"md":[{"d":"2026-05-26","t":"未打卡"},{"d":"2026-06-01","t":"未打卡"},{"d":"2026-06-05","t":"未打卡"},{"d":"2026-06-21","t":"未打卡"}],"rv":true,"rd":3,"rc":1,"lj":false,"js":"三阶","bj":"4","notes":[]},{"n":"淑君34宁波","cn":"淑君34宁波","e":0,"raw":0,"tw":720,"ts":720,"md":[],"rv":false,"rd":0,"rc":0,"lj":false,"js":"三阶","bj":"4","notes":[]},{"n":"文旋33南京","cn":"文旋33南京","e":4,"raw":4,"tw":1432,"ts":426,"md":[{"d":"2026-06-08","t":"未打卡"},{"d":"2026-06-22","t":"未打卡"},{"d":"2026-06-23","t":"未打卡"},{"d":"2026-06-27","t":"未打卡"}],"rv":false,"rd":0,"rc":0,"lj":false,"js":"三阶","bj":"3","notes":[]},{"n":"周卫42上海","cn":"周卫42上海","e":1,"raw":1,"tw":905,"ts":590,"md":[{"d":"2026-06-17","t":"未打卡"}],"rv":false,"rd":0,"rc":0,"lj":false,"js":"四阶","bj":"2","notes":[]},{"n":"向南34呼市","cn":"向南34呼市","e":0,"raw":0,"tw":562,"ts":614,"md":[],"rv":false,"rd":0,"rc":0,"lj":false,"js":"三阶","bj":"4","notes":[]},{"n":"慧明","cn":"慧明","e":1,"raw":1,"tw":2350,"ts":503,"md":[{"d":"2026-06-11","t":"未打卡"}],"rv":false,"rd":0,"rc":0,"lj":false,"js":"四阶","bj":"1","notes":[{"d":"2026-05-26","t":"继续活动肩颈和胳膊。天气热，来时的路上有点累。前面的动作比较小幅度，后面三分之一感觉更有力量一点。经过6次针灸，加上一个多月连续的觉之舞，锁住的肩膀和胳膊今天有快要打开的感觉了。"},{"d":"2026-05-29","t":"1、前面跳的时候有一些笑的状态，没想到靠近后面，一首曲子结束，没有任何征兆就哭了。当时下雨的声音很大，晚上路上也没有人，可以顺其自然大声哭一会儿。流眼泪很舒服，也不能执着。\n\n2、活动脖子的动作多多少少每天都有，今天出现猛烈晃动后脑勺的动作，是两个月来第一次。最近两三年脑袋有些迟钝和呆滞，希望早点扫清业力。\n\n3、开始下雨后转到亭子里，在亭子里跳时忽然想到山神，也是将近两个月在山上跳舞以来第一次。心中表达了感恩。\n\n4、雨有点大，跳完收拾好东西准备下山，忽然就变小了。"},{"d":"2026-05-30","t":"清风，明月，我。今天走在山间林地路上的意境。\n\n今天有一会儿，活动头部时，右侧头部有一片部位被震到（昨天是后脑勺），有点紧或者疼的感觉。头吹了风正是右边这片部位疼。疼的感觉很像。继续清扫。用Uno这首曲子收尾，很适合宁静的清风拂面的当下。\n\n明天十五。宜多打坐多做功课。"},{"d":"2026-05-31","t":"今天deadline模式写心得，没有去外面跳觉之舞，睡觉前跳了一首安静的曲子。"},{"d":"2026-06-01","t":"今天跳时有一会儿做肩膀耸起来上下震动的动作，忽然发现左边的肩膀不疼了！之前一直都是是嘎嘎疼。开心。\n\n试了一下八段锦第一式，双手托塔理三焦。之前胳膊一直不能伸直且疼，今天可以伸直了，只是上臂根部有点可以承受的紧疼。\n\n下山的路上，圆圆的月亮一路相伴，月色真美。"},{"d":"2026-06-03","t":"昨天山上一丝风都没有，乃至晚上还有点热，觉之舞结束后在亭子里修了一座jgsd，状态特别好。今天想着跳完了再修一座，结果跳的时候风有点大。真是训练让人放下期待，对什么都不能执着。觉之舞快结束时，风又停了。\n\n今天有两个重要觉察，虽然过程还不是很清晰，但都是第一次看到。很开心。\n\n一个是白天在家时，从疲惫状态因为忽然出现的兴趣点多巴胺上升，切换到略带兴奋的超聚焦模式。有点像旁观者一样看到了“兴趣驱动型”大脑的运作模式。\n\n第二个是在山上跳舞中途去附近洗手间，天还不是很黑，觉察到恐惧升起的过程。这种经历以前不多，前几天有一次，直接被恐惧带走了。\n\n自从上课以来，一直都很重视看念头和情绪，第一个经历以前有过很多次，为什么今天才第一次看到？原因不止一个，其中之一，最近连续将近两个月的觉之舞功不可没。"},{"d":"2026-06-04","t":"今天有比较多非常缓慢的拉伸，用UNO这首空灵清澈的曲子循环播放。肩膀和胳膊的拉伸，虽然疼，但是脸上有自性的笑。脖子的拉伸，疼，似乎又有隐隐的舒服，gemini说是肌肉筋膜在深度压迫后开始松解的信号。"},{"d":"2026-06-06","t":"今天有很多颈椎前后活动抖动的动作，感觉可能是在松解因为长期头前倾导致紧张的部位。网易云推的几首快节奏音乐也喜欢。跳完了感觉很舒服，很安静。试了八段锦第一式，上臂根部的紧疼感比之前轻了些。没有带蚊香，后面蚊子有点多，不然还可以多跳一会儿。"},{"d":"2026-06-09","t":"早：昨晚在附近大草坪上的阶梯式小广场顶层平台跳，很容易进状态，微风送来一阵阵使君子淡淡的甜香。\n\n带着这个小期待，早上又来了。结果，一来早晨各种锻炼的音乐声，混搭着割草机的声音，反而还不如平时安静；二来，站在使君子花丛旁边，也没有香气（因为傍晚到夜间大量释放挥发性芳香物质，主要是萜烯类等成分，吸引夜行性昆虫传粉）。哈哈，幸好一直有练习，转瞬就放下了期待。\n\n今天早晨很多活动头颈的动作，既有前后抖动，也有上下抖动，还增加了前后抖动胸椎的动作。身体是最聪明的。今天早晨起来似乎有多一点清明感。"},{"d":"2026-06-12","t":"昨天早晨跳完想着晚上一起打，晚上没跳以为早晨打了。记忆力还是没有恢复。早70晚40补昨日漏打40分钟。"},{"d":"2026-06-14","t":"今天除了常规的活动肩颈胳膊和上半身，最后有相当一会儿时间是用手指拍头，力道不小，拍下去是“不通则痛”的那种疼。近年第一次出现这种动作，是不是要开始帮我调理陷入困境已久的大脑了？拍头时流了点眼泪。雨后的傍晚，使君子的甜香很宜人，盛花期就快结束了。\n\n结束后念头很少。走在回家的路上，似有一些抽离感。"},{"d":"2026-06-15","t":"早：\n\n早晨跳觉之舞，除了例行的各种活动肩颈胳膊，今天出现了一个新动作：两只手类似反手摸背，自性上下抖动。\n\n根据以前和 GEMINI 的聊天，知道这是肩周炎恢复中最难的一步。它是三个关节运动的极端复合体。\n\n前面两个多月的觉之舞松解肩颈胳膊，都是在打基础。双手在背后一上一下能够摸到，不再遥不可及。"},{"d":"2026-06-22","t":"今天有很多头向后仰向背靠拢的动作，头前倾的反方向。还有打开胸的动作。练完之后回家路上，明显感到今天的站姿更挺拔一些。"},{"d":"2026-06-26","t":"觉之舞，药不能停。"}]},{"n":"胡晖34北京","cn":"胡晖34北京","e":0,"raw":0,"tw":660,"ts":1708,"md":[],"rv":false,"rd":0,"rc":0,"lj":false,"js":"三阶","bj":"4","notes":[]},{"n":"珍序42京","cn":"珍序42京","e":3,"raw":3,"tw":363,"ts":369,"md":[{"d":"2026-05-30","t":"未打卡"},{"d":"2026-06-06","t":"未打卡"},{"d":"2026-06-26","t":"未打卡"}],"r "cn":"王炫33北京","e":2,"raw":2,"tw":302,"ts":644,"md":[{"d":"2026-06-22","t":"未打卡"},{"d":"2026-06-26","t":"未打卡"}],"rv":false,"rd":0,"rc":0,"lj":false,"js":"三阶","bj":"3","notes":[{"d":"2026-05-23","t":"僵硬和沉重的身体，在音乐中慢慢变得舒展和放松。"},{"d":"2026-05-24","t":"感受到声音在身体里的振动，能量升起，身体发热"},{"d":"2026-05-28","t":"跳完觉之舞，两只手特别热，放在膝盖上，很温暖，很舒服🌹"}]},{"n":"婷婷34陕西","cn":"婷婷34陕西","e":0,"raw":0,"tw":4094,"ts":921,"md":[],"rv":false,"rd":0,"rc":0,"lj":false,"js":"三阶","bj":"4","notes":[{"d":"2026-05-27","t":"觉之舞本来想好释放哪个事積聚的负能量了。结果最近因缘成熟，开音乐前就进入了2008年地震和后面一次日食在心里留下的恐惧。\n\n自然灾害留下的恐惧不是其它恐惧能比的。\n\n是养育我们的大地震動，这种情况下所有生灵都陷入恐慌。\n深深感恩大地妈妈。感恩老师和所有FPS，HF，SS！\n\n这个主题有些难搞呀！\n\n向勇敢无畏的马群姐致敬！"},{"d":"2026-05-28","t":"身体练习收获整理\n\n1. 呼吸与躯干变化\n      今天感觉到肺部由原来的僵硬状态开始松开，伴有轻微酥、痒、麻的感觉，整体舒适。全身也由僵硬逐渐向松弛转变。\n2. 脊柱与腰腹进步\n      脊柱左侧一长条肌肉得到明显拉伸，后腰肌肉得到了有效锻炼。腰腹力量开始恢复，腹式呼吸随之有了进步。\n3. 左手臂与肩胛问题突破\n      之前并不清楚左手臂与肩胛骨之间存在联动问题。通过持续练习“觉之舞”，痛感逐渐显现——起初练习时间短，痛感不强烈；近一周痛感达到顶峰，几乎全天疼痛，甚至梦中出现穿不上衣服的场景。但实际中，原本连碗都端不住的手臂，现在已经能端住碗了。\n4. 疼痛的意外消退\n      昨天早上看到疼痛的原因后，今早起床疼痛竟完全消失。白天虽仍有轻微痛感，但很浅。练习“觉之舞”时，没有疼痛。"},{"d":"2026-05-31","t":"皮肤—内脏，粗糙的第一遍到达。\n\n1. 身体的结构与传导\n\n· 层次逻辑：皮→肌肉→筋膜→骨头→内脏，这是力线与信息的传导路径\n· 骨架即主体：如房屋承重墙，骨正才能支撑其他软组织的顺位\n· 相互影响：问题可以从骨头影响到皮肉内脏，反之亦然——这是整体观，不是单一归因\n\n2. 觉之舞的干预逻辑\n\n· 调的是整体：不局部治疗，而是通过动态整合恢复系统平衡\n· 气脉与肉体的交互：动作引导呼吸与能量流动，肉体姿势反过来也疏通气脉——这是双向调节\n· 身心一体：早上觉之舞后面心里涌出一股“带着兴奋的强烈欢喜”，正是气脉通畅后影响心境的实证。\n是实验手册。去做，就会有产出！\n\n3. 方法论定位\n\n·老师教的是离苦得乐的科学实验手册。不是个概念或者要我们去迷信的东西。\n\n· 拿自己做实验：我就是实验室，感受就是数据，身心变化就是结果。"},{"d":"2026-06-15","t":"觉之舞也是按阶上，有层次的。\n不要小瞧了一阶觉之舞。一样可以清大资料。"}]},{"n":"郑琳","cn":"郑琳","e":2,"raw":2,"tw":1274,"ts":847,"md":[{"d":"2026-06-04","t":"未达标 · 舞:0, 诵:20分钟"},{"d":"2026-06-06","t":"未打卡"}],"rv":false,"rd":0,"rc":0,"lj":false,"js":"四阶","bj":"1","notes":[]},{"n":"刘青34马鞍山（刘青）","cn":"刘青34马鞍山(刘青)","e":0,"raw":0,"tw":769,"ts":339,"md":[],"rv":false,"rd":0,"rc":0,"lj":false,"js":"三阶","bj":"4","notes":[]},{"n":"张鹤子34广州（鹤子）","cn":"张鹤子34广州(鹤子)","e":3,"raw":6,"tw":951,"ts":709,"md":[{"d":"2026-05-25","t":"未打卡"},{"d":"2026-05-31","t":"未打卡"},{"d":"2026-06-11","t":"未打卡"},{"d":"2026-06-20","t":"未打卡"},{"d":"2026-06-24","t":"未打卡"},{"d":"2026-06-27","t":"未打卡"}],"rv":true,"rd":3,"rc":1,"lj":false,"js":"三阶","bj":"4","notes":[]},{"n":"大雁42北京","cn":"大雁42北京","e":1,"raw":1,"tw":1011,"ts":542,"md":[{"d":"2026-06-27","t":"未打卡"}],"rv":false,"rd":0,"rc":0,"lj":false,"js":"四阶","bj":"2","notes":[{"d":"2026-05-26","t":"舞完轻松愉悦，诵完宁静平和。\n祝大家都能收获更好的自己！"}]},{"n":"其  汇33广州（其汇）","cn":"其汇33广州(其汇)","e":0,"raw":3,"tw":1040,"ts":1058,"md":[{"d":"2026-05-23","t":"未打卡"},{"d":"2026-05-24","t":"未打卡"},{"d":"2026-06-06","t":"未打卡"}],"rv":true,"rd":3,"rc":1,"lj":false,"js":"三阶","bj":"3","notes":[]},{"n":"艾静34Vancouver","cn":"艾静34Vancouver","e":0,"raw":0,"tw":1508,"ts":803,"md":[],"rv":false,"rd":0,"rc":0,"lj":false,"js":"三阶","bj":"4","notes":[{"d":"2026-05-23","t":"放松，清明"},{"d":"2026-05-25","t":"观无常流泪"},{"d":"2026-05-27","t":"跳舞这几天一直打嗝，打哈欠🥱"},{"d":"2026-05-30","t":"今天觉之舞带给我很大的触动：\n1: 跳到40分钟的时候突然一股委屈的感觉跑出来，正要陷入委屈的情绪中的时候，突然一个以第三角度看着这个小人说，你虽然受了很多委屈，但是你始终没有放弃最后的一丝善良。你应该为自己而骄傲啊！这个声音对我这个小人来说是一股强心剂，我带着欢喜和委屈哭了！也笑了！\n2: 跳到最后头脑很安静，身体有一些累，音乐比较激烈，但是当头脑不再分别声音轻重缓急的时候，身体一下也放松了，可以在很激烈的音乐节奏中缓慢的转动着，也可以是身体发出信号现在想要动的激烈一些。少了分析，少了分别，身心都觉得自由了，轻松了😌！"},{"d":"2026-06-04","t":"这两天跳完舞总觉得能闻到淡淡的雨后大地湿润的味道，我甚至还打开窗户去看了，是不是下雨了☔️，好好玩！"},{"d":"2026-06-07","t":"很享受今天的觉之舞，后20分钟几乎处于无念和宽广的觉的状态。感受到了无念原来如此轻静！最后几分钟，被一种深深的感恩心和臣服心触动哭泣，感恩莲师，感恩两位老师的加持与陪伴！"},{"d":"2026-06-26","t":"今天跳舞的时候被一位学长的话加持了。那句亲爱的，在哪里都可以安心修行，让我泪流不止！一颗漂泊的心，再次遇到港湾，被接受，被爱！"}]},{"n":"惠惠34厦门","cn":"惠惠34厦门","e":1,"raw":1,"tw":356,"ts":550,"md":[{"d":"2026-06-18","t":"未打卡"}],"rv":false,"rd":0,"rc":0,"lj":false,"js":"三阶","bj":"4","notes":[{"d":"2026-05-23","t":"早上醒来，心里有无名烦恼，跳舞、唱诵，让内心清净。\n中午练习一次，享受属于自己的时间。\n有烦恼时唱觉之诵会更专注、投入，情绪也很快就不见了。"},{"d":"2026-05-24","t":"美好的一天从跳舞，唱诵开启。唱完觉之诵觉得困了，再来个禅睡。"},{"d":"2026-05-25","t":"晚上陪女儿睡觉时容易因为她入睡慢而着急，唱诵时想着我做好自己的事就行了，放下心里的焦虑。"},{"d":"2026-05-26","t":"早上醒来不想起床，觉得心里在逃避什么，不想面对。跳舞唱诵之后逃避的想法消失了。"},{"d":"2026-05-27","t":"遇到事情的时候，练习就会更认真和努力"},{"d":"2026-05-28","t":"晚上女儿因为时间到了（提前提醒过她时间）不能按摩而生气，哭闹。我有点生气。在她继续哭闹时我坐在椅子上唱觉之诵，竟然一点都不受她影响，内心没有生气，没有责怪，还觉得唱得更投入和认真，感受到内心的平静。唱了大概10分钟后，我告诉她：“我知道你因为不能按摩而生气和难过，还有点自责。妈妈不生气，也不怪你。我抱抱你，安慰你一下，好吗？”她同意了。如果是之前，我或者对她生气，责怪，或者打她的身体，或者不想管她让她哭个够，内心坚硬、觉得她讨厌、不讲道理。今天唱着觉之诵，允许她哭，在同理她，安慰她。我们的心情都很好。"},{"d":"2026-05-31","t":"今天陪伴女儿睡觉，再次感受到觉之诵的力量。依然是睡前按摩问题，多次提醒她早点洗漱，她躺下来还剩15分钟按摩时间，她生气因为觉得时间太短。我说：“给你按摩你也生气，不按摩你也生气，那还不如不要按摩，我比较轻松，反正你都要生气。还是你要选择开心地享受按摩的时间？”按摩时间结束，她又生气没有按摩到头和后背，在床上边踢边哭闹（我猜也跟我按摩完告诉她对奶奶说话要有礼貌有关系）。\n        她哭闹时，我坐在床上唱觉之诵，心里想“打她屁股，让她不要再无理取闹，让她知道我的厉害”的想法消失了，我内心平静，允许、不评判她的情绪和行为。我说：“今天你出去玩也累了，早点睡吧。我牵着着你的手。”明显感觉到她的愤怒减少了，她把手放在我的手里，哭声逐渐减小，她拿我的手给自己擦眼泪。我继续跟着央金老师唱觉之诵。过了一会她的情绪平稳，我说：“你睡吧，妈妈不生气，我爱你。”\n        当我有情绪的时候，觉之诵让我内心平静，心胸宽广、舒畅，能保持觉。"},{"d":"2026-06-01","t":"慢慢走，不要停，快快到"}]},{"n":"振宇33香港","cn":"振宇33香港","e":9,"raw":15,"tw":287,"ts":526,"md":[{"d":"2026-05-25","t":"未打卡"},{"d":"2026-05-26","t":"未达标 · 舞:0, 诵:40分钟"},{"d":"2026-05-28","t":"未达标 · 舞:0, 诵:20分钟"},{"d":"2026-05-29","t":"未达标 · 舞:0, 诵:20分钟"},{"d":"2026-06-07","t":"未打卡"},{"d":"2026-06-13","t":"未打卡"},{"d":"2026-06-18","t":"未打卡"},{"d":"2026-06-19","t":"未打卡"},{"d":"2026-06-20","t":"未打卡"},{"d":"2026-06-21","t":"未打卡"},{"d":"2026-06-22","t":"未打卡"},{"d":"2026-06-23","t":"未打卡"},{"d":"2026-06-25","t":"未打卡"},{"d":"2026-06-26","t":"未达标 · 舞:0, 诵:20分钟"},{"d":"2026-06-27","t":"未打卡"}],"rv":true,"rd":6,"rc":2,"lj":false,"js":"三阶","bj":"3","notes":[{"d":"2026-05-23","t":"愉悦心情"},{"d":"2026-05-26","t":"補打5-25 誦20分鐘"},{"d":"2026-06-06","t":"好久没有跳足一个音频，感觉舒畅。按自己节奏"}]},{"n":"春梅34新疆（木美）","cn":"春梅34新疆(木美)","e":0,"raw":0,"tw":1373,"ts":997,"md":[],"rv":false,"rd":0,"rc":0,"lj":false,"js":"三阶","bj":"4","notes":[{"d":"2026-05-23","t":"诵和舞扫去疲惫嘎嘎好"},{"d":"2026-05-24","t":"今天比较忙，还好有打卡，不然就懈怠了"},{"d":"2026-05-25","t":"多跳激活身体"},{"d":"2026-05-27","t":"能量满满"},{"d":"2026-05-28","t":"最后一段音乐越慢越静越能感受到能量就在自己身旁"},{"d":"2026-05-29","t":"感受到能量，想着把这些能量传递给周围的人的时候身体微微发热，好像是心轮附近，好神奇"},{"d":"2026-05-30","t":"连续工作一天，肩背很紧张，以往都会伴随头疼，今天没有头疼。哈哈哈，是连续跳觉之舞的功劳吧！\n肩背紧张用觉之舞前行的音乐拉伸感觉也很不错！"},{"d":"2026-05-31","t":"今天吉祥日，把今天所有的善法功德回向给所有的同修们和即将高考的学子们，愿同修
